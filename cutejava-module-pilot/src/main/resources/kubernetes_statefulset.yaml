kind: StatefulSet
apiVersion: apps/v1
metadata:
  # 标识具体statefulset的名称
  name: {{pilot-app}}-{{pilot-env}}-pod
  namespace: {{pilot-app}}
spec:
  # Pod 副本数量，定义需要运行的 Pod 实例数
  replicas: {{pilot-replicas}}
  # Pod 管理策略，控制 StatefulSet 中 Pod 的启动和停止顺序
  # OrderedReady: 按顺序依次启动和停止 Pod，从 0 到 N-1 顺序创建，逆序删除（默认值）
  # Parallel: 并行启动和停止所有 Pod，不保证顺序
  podManagementPolicy: OrderedReady
  # 标签选择器，用于识别 StatefulSet 管理的 Pod
  selector:
    matchLabels:
      pilot-app: {{pilot-app}}
      pilot-env: {{pilot-env}}
  # Service 名称，为每个 Pod 提供稳定的网络标识符。这里必须与 Service 名称一致
  serviceName: {{pilot-app}}-{{pilot-env}}-svc
  # Pod 模板定义
  template:
    metadata:
      labels:
        pilot-app: {{pilot-app}}
        pilot-env: {{pilot-env}}
    spec:
      # Pod 反亲和性配置，避免 Pod 调度到同一节点或可用区
      affinity:
        podAntiAffinity:
          # 软性反亲和策略，调度器会尽量满足但不强制
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: pilot-app
                      operator: In
                      values:
                        - {{pilot-app}}
                # 拓扑域键名，failure-domain.beta.kubernetes.io/zone 表示按可用区分散
                topologyKey: failure-domain.beta.kubernetes.io/zone
              # 权重值，范围 1-100，权重越高优先级越高
              weight: 50
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: pilot-app
                      operator: In
                      values:
                        - {{pilot-app}}
                # kubernetes.io/hostname 表示按节点分散
                topologyKey: kubernetes.io/hostname
              weight: 50
      containers:
        - # 容器镜像地址
          image: {{pilot-image}}
          # 镜像拉取策略(如果存在已更新的同版本镜像，这个时候你们都懂，生产事故谁背，就他喵的运维背)
          # IfNotPresent: 仅当本地不存在镜像时才拉取（默认值）
          # Always: 每次启动 Pod 都拉取镜像
          # Never: 永不拉取镜像，仅使用本地镜像
          imagePullPolicy: Always
          # 容器生命周期钩子
          lifecycle:
            # 容器停止前执行的命令，用于优雅关闭
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - /home/admin/stop.sh
          # 容器名称(标识具体容器的名称)
          name: {{pilot-app}}-{{pilot-env}}-biz
          # 存活探针，检测容器是否正常运行，失败则重启容器
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health/check
              port: {{pilot-port}}
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          # 就绪探针，检测容器是否已准备好接收流量
          readinessProbe:
            # 失败阈值，连续失败次数达到此值后 Pod 将被标记为未就绪
            # 取值范围: 1-10，默认值: 3
            failureThreshold: 3
            # HTTP GET 探测方式
            httpGet:
              path: /health/check
              port: {{pilot-port}}
            # 初始延迟秒数，容器启动后等待此时间才开始探测
            # 用于等待应用完全启动，默认值: 0
            initialDelaySeconds: 30
            # 探测周期秒数，每隔此时间执行一次探测
            # 取值范围: 1-300，默认值: 10
            periodSeconds: 10
            # 成功阈值，连续成功次数达到此值后 Pod 被标记为就绪
            # 取值范围: 1-10，默认值: 1
            successThreshold: 1
            # 超时秒数，探测请求的超时时间
            # 取值范围: 1-60，默认值: 1
            timeoutSeconds: 1
          # 资源配置
          resources:
            limits:
              cpu: {{pilot-cpu}}
              memory: {{pilot-memory}}
            requests:
              cpu: {{pilot-cpu}}
              memory: {{pilot-memory}}
          # 存储卷挂载配置
          volumeMounts:
            - # 容器内挂载路径
              mountPath: /home/admin/logs
              # 引用的 Volume 名称
              name: {{pilot-app}}-volume
              # Volume 内的子路径，将 Volume 中的 logs 子目录挂载到容器指定路径
              subPath: logs
      # DNS 策略，配置 Pod 的 DNS 解析行为
      # ClusterFirst: 优先使用集群 DNS，失败后回退到宿主机 DNS（默认值）
      # Default: 仅使用宿主机 DNS
      # None: 不使用任何 DNS 配置
      # ClusterFirstWithHostNet: 在 hostNetwork 模式下使用集群 DNS
      dnsPolicy: ClusterFirst
      # Pod 重启策略
      # Always: 始终重启（默认值）
      # OnFailure: 仅在失败时重启
      # Never: 永不重启
      restartPolicy: Always
      # 容器优雅终止等待时间（秒），用于等待容器完成清理工作
      terminationGracePeriodSeconds: 30
      # 存储卷定义
      volumes:
        - # emptyDir 临时卷，Pod 删除时数据也会被清除
          emptyDir:
            # 存储卷大小限制
            sizeLimit: {{pilot-volume-size}}
          name: {{pilot-app}}-volume
  # StatefulSet 更新策略
  updateStrategy:
    # 更新策略类型
    # RollingUpdate: 滚动更新，逐步替换旧版本 Pod（默认值）
    # OnDelete: 手动删除 Pod 后才会创建新版本 Pod
    type: RollingUpdate
    rollingUpdate:
      # 最大不可用 Pod 数量，更新过程中允许同时处于不可用状态的最大 Pod 数
      # 可以是绝对值（如 1）或百分比（如 25%），默认值: 1
      # 当设置为 1 时，一次只更新一个 Pod，确保服务可用性
      # 注意：当 replicas=1 时，建议设置为 0 避免服务中断
      maxUnavailable: {{pilot-max-unavailable}}
      # 分区更新策略，用于灰度发布或金丝雀发布
      # 当 partition 为 N 时，只有序号 >= N 的 Pod 会被更新
      # 序号 < N 的 Pod 保持不变
      # 取值范围: 0 到 replicas-1，设置为 replicas 时表示不更新任何 Pod
      # 默认值: 0（所有 Pod 都会更新）
      partition: {{pilot-partition}}
